<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>t.a.g 商材注文フォーム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
  :root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2e2e2e;--accent:#c8a96e;--accent2:#e8c88a;--text:#f0ece4;--text2:#9a9285;--text3:#5a5550;--danger:#e05555;--success:#5aaa7a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh}

  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
  .logo{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;color:var(--accent);letter-spacing:.15em}
  .logo span{color:var(--text2);font-size:11px;margin-left:8px}
  .header-right{display:flex;gap:8px;align-items:center}
  .hbtn{border-radius:20px;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
  .hbtn-outline{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
  .hbtn-outline:hover{border-color:var(--accent);color:var(--accent)}
  .hbtn-gold{background:var(--accent);color:#0f0f0f;border:none;font-weight:700;font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px}
  .hbtn-gold:hover{background:var(--accent2)}
  .edit-mode-banner{background:rgba(200,169,110,.1);border-bottom:1px solid rgba(200,169,110,.25);padding:8px 20px;text-align:center;font-size:12px;color:var(--accent);display:none}
  .edit-mode-banner.show{display:block}

  .main{max-width:680px;margin:0 auto;padding:20px 16px 120px}
  .section-label{font-size:10px;font-weight:500;letter-spacing:.2em;color:var(--text3);text-transform:uppercase;margin-bottom:10px}

  .staff-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:24px}
  .staff-btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.06em;padding:10px 4px;border-radius:6px;cursor:pointer;transition:all .15s;text-align:center}
  .staff-btn:hover{border-color:var(--accent);color:var(--text)}
  .staff-btn.active{background:var(--accent);border-color:var(--accent);color:#0f0f0f;font-weight:700}

  .maker-tabs{display:flex;margin-bottom:14px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .maker-tab{flex:1;background:var(--surface);border:none;color:var(--text2);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:10px 4px;cursor:pointer;transition:all .15s;border-right:1px solid var(--border);text-align:center}
  .maker-tab:last-child{border-right:none}
  .maker-tab:hover{background:var(--surface2);color:var(--text)}
  .maker-tab.active{background:var(--surface2);color:var(--accent);font-weight:500}
  .search-wrap{position:relative;margin-bottom:14px}
  .search-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:13px;padding:10px 14px 10px 36px;border-radius:8px;outline:none;transition:border-color .15s}
  .search-input:focus{border-color:var(--accent)}
  .search-input::placeholder{color:var(--text3)}
  .sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

  .brand-section{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .brand-header{background:var(--surface2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;user-select:none;border-bottom:1px solid var(--border)}
  .brand-header-left{display:flex;align-items:center;gap:6px;flex:1;cursor:pointer}
  .brand-name{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);letter-spacing:.05em}
  .maker-pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
  .maker-lily{background:rgba(90,170,122,.15);color:var(--success)}
  .maker-mirabis{background:rgba(200,169,110,.15);color:var(--accent)}
  .brand-meta{display:flex;align-items:center;gap:6px}
  .brand-count{font-size:11px;color:var(--text3)}
  .has-items{color:var(--success)!important}
  .chevron{font-size:10px;color:var(--text3);transition:transform .2s}
  .chevron.open{transform:rotate(180deg)}
  .brand-del-btn{background:transparent;border:1px solid var(--border);color:var(--text3);font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s;display:none;white-space:nowrap}
  .brand-del-btn:hover{border-color:var(--danger);color:var(--danger)}
  .edit-mode .brand-del-btn{display:block}

  .items-list{display:none}
  .items-list.open{display:block}

  .item-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:10px;transition:background .1s}
  .item-row:last-child{border-bottom:none}
  .item-row:hover{background:rgba(200,169,110,.03)}
  .item-name{flex:1;font-size:13px;color:var(--text)}
  .item-del-btn{background:transparent;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;transition:color .15s;display:none}
  .item-del-btn:hover{color:var(--danger)}
  .edit-mode .item-del-btn{display:block}
  .qty-control{display:flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .qty-btn{background:var(--surface2);border:none;color:var(--text2);width:32px;height:32px;font-size:16px;cursor:pointer;transition:all .1s;display:flex;align-items:center;justify-content:center}
  .qty-btn:hover{background:var(--border);color:var(--text)}
  .qty-btn:active{background:var(--accent);color:#0f0f0f}
  .qty-display{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text);width:36px;text-align:center;background:var(--surface);padding:6px 0}
  .qty-display.has-value{color:var(--accent)}
  .edit-mode .qty-control{display:none}

  .add-item-row{display:flex;align-items:center;padding:8px 16px;gap:8px;border-top:1px dashed var(--border)}
  .add-item-input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:13px;padding:7px 10px;border-radius:6px;outline:none;transition:border-color .15s;font-family:'Noto Sans JP',sans-serif}
  .add-item-input:focus{border-color:var(--accent)}
  .add-item-input::placeholder{color:var(--text3)}
  .add-item-confirm{background:var(--accent);border:none;color:#0f0f0f;font-size:12px;font-weight:700;padding:7px 12px;border-radius:6px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif}
  .add-item-confirm:hover{background:var(--accent2)}

  .bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;align-items:center}
  .submit-btn{flex:1;background:var(--accent);color:#0f0f0f;border:none;padding:14px;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
  .submit-btn:hover{background:var(--accent2)}
  .submit-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed}
  .reset-btn{background:transparent;border:1px solid var(--border);color:var(--text3);padding:14px 16px;border-radius:8px;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Noto Sans JP',sans-serif}
  .reset-btn:hover{border-color:var(--danger);color:var(--danger)}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:84vh;overflow-y:auto;padding:20px;animation:slideUp .22s ease-out}
  .modal-sm{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:680px;padding:24px;animation:slideUp .22s ease-out}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .modal-title{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent);letter-spacing:.1em}
  .modal-close{background:var(--surface2);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
  .order-brand-label{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin:12px 0 4px}
  .order-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
  .order-row:last-child{border-bottom:none}
  .order-qty{font-family:'DM Mono',monospace;color:var(--accent);font-weight:500}

  .form-row{margin-bottom:16px}
  .form-label{font-size:10px;color:var(--text3);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;display:block}
  .form-input,.form-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:13px;padding:11px 12px;border-radius:8px;outline:none;transition:border-color .15s;font-family:'Noto Sans JP',sans-serif}
  .form-input:focus,.form-select:focus{border-color:var(--accent)}
  .form-input::placeholder{color:var(--text3)}
  .err-msg{color:var(--danger);font-size:12px;margin-top:10px;display:none}

  .success-screen{display:none;text-align:center;padding:60px 20px}
  .success-screen.show{display:block}

  .staff-required{text-align:center;padding:24px;color:var(--text3);font-size:13px;border:1px dashed var(--border);border-radius:10px;margin-bottom:16px;display:none}
  .staff-required span{color:var(--accent);font-weight:500}

  .confirm-dialog{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;margin:0 auto;max-width:320px;text-align:center;animation:slideUp .2s ease-out}
  .confirm-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:8px}
  .confirm-sub{font-size:12px;color:var(--text2);margin-bottom:18px;line-height:1.6}

  /* 納品確認 */
  .delivery-staff-card{background:var(--surface2);border-radius:8px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .delivery-order-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
  .delivery-item-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;font-size:13px;border-bottom:1px solid var(--border)}
  .delivery-item-row:last-child{border-bottom:none}
  .delivery-item-name{color:var(--text);flex:1}
  .delivery-item-qty{font-family:'DM Mono',monospace;color:var(--accent);font-weight:500;margin:0 12px;white-space:nowrap}
  .status-badge{font-size:11px;padding:3px 8px;border-radius:10px;font-weight:500;white-space:nowrap}
  .status-pending{background:rgba(200,169,110,.15);color:var(--accent)}
  .status-done{background:rgba(90,170,122,.15);color:var(--success)}
  .delivery-summary-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.2);border-radius:8px;margin-bottom:14px}
  .no-orders{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
  .loading-spinner{text-align:center;padding:30px;color:var(--text2);font-size:13px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">t.a.g <span>商材注文</span></div>
  <div class="header-right">
    <button class="hbtn hbtn-outline" onclick="openDeliveryCheck()">📦 納品確認</button>
    <button class="hbtn hbtn-outline" id="edit-toggle-btn" onclick="toggleEditMode()">✏️ 編集</button>
    <button class="hbtn hbtn-outline" onclick="openAddModal()">＋ ブランド追加</button>
    <button class="hbtn hbtn-gold" onclick="openCart()">🛒 <span id="cart-count">0</span></button>
  </div>
</div>

<div class="edit-mode-banner" id="edit-banner">
  ✏️ 編集モード — 商材・ブランドを自由に追加・削除できます
</div>

<div class="main" id="main-wrap">
  <div id="form-content">
    <div class="section-label">スタッフ名を選択</div>
    <div class="staff-grid" id="staff-grid"></div>
    <div class="staff-required" id="staff-required">先に<span>スタッフ名</span>を選択してください</div>
    <div class="search-wrap">
      <span class="sicon">🔍</span>
      <input class="search-input" id="search-input" type="text" placeholder="商材名・ブランド名で検索..." oninput="filterItems(this.value)">
    </div>
    <div class="maker-tabs">
      <button class="maker-tab active" onclick="switchMaker('all',this)">全て</button>
      <button class="maker-tab" onclick="switchMaker('lily',this)">リリー</button>
      <button class="maker-tab" onclick="switchMaker('mirabis',this)">ミラビス</button>
    </div>
    <div id="brands-container"></div>
  </div>

  <div class="success-screen" id="success-screen">
    <div style="font-size:48px;margin-bottom:16px">✅</div>
    <div style="font-size:20px;font-weight:700;color:var(--accent);margin-bottom:8px">注文を送信しました</div>
    <div style="font-size:13px;color:var(--text2);line-height:1.8" id="success-detail"></div>
    <br>
    <button onclick="resetAll()" style="background:var(--accent);border:none;color:#0f0f0f;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Noto Sans JP',sans-serif">次の注文を入力</button>
  </div>
</div>

<div class="bottom-bar" id="bottom-bar">
  <button class="reset-btn" onclick="resetItems()">リセット</button>
  <button class="submit-btn" id="submit-btn" onclick="openCart()" disabled>注文内容を確認する</button>
</div>

<!-- 納品確認モーダル -->
<div class="modal-overlay" id="delivery-overlay" onclick="if(event.target===this)closeDeliveryCheck()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">📦 納品確認</div>
      <button class="modal-close" onclick="closeDeliveryCheck()">✕</button>
    </div>
    <div id="delivery-content"></div>
    <div style="margin-top:16px;display:flex;gap:10px" id="delivery-btn-area"></div>
  </div>
</div>

<!-- カートモーダル -->
<div class="modal-overlay" id="cart-overlay" onclick="if(event.target===this)closeCart()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">注文確認</div>
      <button class="modal-close" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-content"></div>
    <div style="margin-top:16px;display:flex;gap:10px">
      <button onclick="closeCart()" class="reset-btn" style="flex:1">戻る</button>
      <button onclick="submitOrder()" class="submit-btn" style="flex:2">この内容で送信する</button>
    </div>
  </div>
</div>

<!-- ブランド追加モーダル -->
<div class="modal-overlay" id="add-overlay" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-sm">
    <div class="modal-header">
      <div class="modal-title">ブランドを追加</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="form-row">
      <label class="form-label">発注先</label>
      <select class="form-select" id="add-maker">
        <option value="lily">リリー</option>
        <option value="mirabis">ミラビス</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">新しいブランド名</label>
      <input class="form-input" id="add-brand-name" type="text" placeholder="例：ニューブランド" onkeydown="if(event.key==='Enter')confirmAddBrand()">
    </div>
    <div style="display:flex;gap:10px">
      <button onclick="closeAddModal()" class="reset-btn" style="flex:1">キャンセル</button>
      <button onclick="confirmAddBrand()" class="submit-btn" style="flex:2">追加する</button>
    </div>
    <div class="err-msg" id="add-brand-err"></div>
  </div>
</div>

<!-- 削除確認モーダル -->
<div class="modal-overlay" id="confirm-overlay" onclick="if(event.target===this)closeConfirm()">
  <div style="width:100%;max-width:680px;padding:20px;animation:slideUp .2s ease-out">
    <div class="confirm-dialog">
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-sub" id="confirm-sub"></div>
      <div style="display:flex;gap:10px">
        <button onclick="closeConfirm()" class="reset-btn" style="flex:1;padding:11px">キャンセル</button>
        <button id="confirm-ok" class="submit-btn" style="flex:1;background:var(--danger)">削除する</button>
      </div>
    </div>
  </div>
</div>

<script>
const STAFF=['AKIRA','RYUTA','KURA','RYUKI','TAKEYAN','YUKA','REN'];
const GAS_URL='https://script.google.com/macros/s/AKfycbxG2-VmdwaDVfxpzR87bnvzSVYe3vGEZDAgBrbTCgTwrE_uuxCB4tJTW18AsNyS3olIzQ/exec';

  'ソフタッチ':{maker:'lily',items:['６/６８','６/７']},

  'フィヨーレ':{maker:'lily',items:['４GP','６GP','８GP','１０GP','４MT','６MT','８MT','１０MT','O１０','コッパーオレンジ','6ウルトラバイオレット','ブラックブースター１','クリア','クリア０','BV6','O7','11ピンクベージュ','11サンドベージュ','10コーラルピンク','6ピンク','14ベージュ','10ミルキーホワイト','レッド7','B6','5グレー','9グレー','11グレー','ｸｫﾙｼｱﾌﾞﾘｰﾁ','12MT','10MB','3NB','2NN','4GNB','7シルバー','9シルバー','マット','14ラベンダー','V6','クオルシアブリーチ','YM6','YM10','3MT','3グレー','ディープパープル5','ピンクベージュ13','クオルシアオレンジ10','カーディナルレッド7','クオルシア14ハイライトナー','12GA','Y10','7アクアブルー','ホワイトピンク','ホワイトベージュ','ホワイトアッシュ','G6']},

let BRANDS={};
let selectedStaff=null,quantities={},currentMaker='all',searchQuery='',editMode=false;
const STORE_KEY='tag_brands_v2';

function saveStorage(){try{localStorage.setItem(STORE_KEY,JSON.stringify(BRANDS));}catch(e){}}
function loadStorage(){
  try{const d=localStorage.getItem(STORE_KEY);if(d){BRANDS=JSON.parse(d);return;}}catch(e){}
  BRANDS={};
  Object.entries(DEFAULT_BRANDS).forEach(([b,d])=>{BRANDS[b]={maker:d.maker,items:[...d.items]};});
}
function sk(s){
  try{return btoa(encodeURIComponent(s)).replace(/[^a-zA-Z0-9]/g,'_');}
  catch(e){return s.replace(/[^a-zA-Z0-9]/g,'_');}
}
function init(){
  loadStorage();
  const grid=document.getElementById('staff-grid');
  STAFF.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='staff-btn';btn.textContent=s;
    btn.onclick=()=>selectStaff(s,btn);
    grid.appendChild(btn);
  });
  renderBrands();updateCartCount();
}
function toggleEditMode(){
  editMode=!editMode;
  document.getElementById('main-wrap').classList.toggle('edit-mode',editMode);
  document.getElementById('edit-banner').classList.toggle('show',editMode);
  const btn=document.getElementById('edit-toggle-btn');
  btn.textContent=editMode?'✅ 完了':'✏️ 編集';
  btn.style.color=editMode?'var(--success)':'';
  btn.style.borderColor=editMode?'var(--success)':'';
  renderBrands();
}
function selectStaff(name,btn){
  selectedStaff=name;
  document.querySelectorAll('.staff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('staff-required').style.display='none';
  updateCartCount();
}
function switchMaker(maker,btn){
  currentMaker=maker;
  document.querySelectorAll('.maker-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderBrands();
}
function filterItems(q){searchQuery=q.trim().toLowerCase();renderBrands();}
function renderBrands(){
  const container=document.getElementById('brands-container');
  container.innerHTML='';let any=false;
  Object.entries(BRANDS).forEach(([brand,data])=>{
    if(currentMaker!=='all'&&data.maker!==currentMaker)return;
    const items=searchQuery?data.items.filter(i=>i.toLowerCase().includes(searchQuery)||brand.toLowerCase().includes(searchQuery)):data.items;
    if(!items.length&&!editMode)return;
    any=true;
    const totalQty=data.items.reduce((s,i)=>s+(quantities[brand+':'+i]||0),0);
    const isOpen=!!searchQuery||totalQty>0||editMode;
    const mc=data.maker==='lily'?'maker-lily':'maker-mirabis';
    const ml=data.maker==='lily'?'リリー':'ミラビス';
    const besc=brand.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const sec=document.createElement('div');
    sec.className='brand-section';
    sec.innerHTML=`
      <div class="brand-header">
        <div class="brand-header-left" onclick="toggleBrand(this.parentElement)">
          <span class="brand-name">${brand}</span>
          <span class="maker-pill ${mc}">${ml}</span>
        </div>
        <div class="brand-meta">
          <button class="brand-del-btn" data-brand="${encodeURIComponent(brand)}" onclick="confirmDeleteBrandByEl(this)">🗑 削除</button>
          <span class="brand-count${totalQty>0?' has-items':''}">${totalQty>0?'✓ '+totalQty+'個':items.length+'種'}</span>
          <span class="chevron${isOpen?' open':''}">▼</span>
        </div>
      </div>
      <div class="items-list${isOpen?' open':''}">
        ${data.items.map(item=>{
          const qty=quantities[brand+':'+item]||0;
          const sid=sk(brand+item);
          const da=`data-brand="${encodeURIComponent(brand)}" data-item="${encodeURIComponent(item)}"`;
          return `<div class="item-row" ${da}>
            <button class="item-del-btn" onclick="confirmDeleteByEl(this)">×</button>
            <div class="item-name">${item}</div>
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQtyByEl(this,-1)">−</button>
              <div class="qty-display${qty>0?' has-value':''}" id="q_${sid}">${qty}</div>
              <button class="qty-btn" onclick="changeQtyByEl(this,1)">＋</button>
            </div>
          </div>`;
        }).join('')}
        <div class="add-item-row">
          <input class="add-item-input" type="text" placeholder="商材名を入力して追加..." id="ii_${sk(brand)}" onkeydown="if(event.key==='Enter')inlineAdd('${besc}')">
          <button class="add-item-confirm" onclick="inlineAdd('${besc}')">＋追加</button>
        </div>
      </div>`;
    container.appendChild(sec);
  });
  if(!any)container.innerHTML='<div style="text-align:center;padding:40px;color:var(--text3);font-size:13px">該当する商材が見つかりません</div>';
  if(editMode){
    document.querySelectorAll('.item-del-btn').forEach(b=>b.style.display='block');
    document.querySelectorAll('.brand-del-btn').forEach(b=>b.style.display='block');
    document.querySelectorAll('.qty-control').forEach(b=>b.style.display='none');
  }
}
function toggleBrand(header){
  const list=header.nextElementSibling;const ch=header.querySelector('.chevron');
  list.classList.toggle('open');ch.classList.toggle('open',list.classList.contains('open'));
}
function changeQtyByEl(btn,delta){
  const row=btn.closest('.item-row');
  changeQty(decodeURIComponent(row.dataset.brand),decodeURIComponent(row.dataset.item),delta);
}
function confirmDeleteByEl(btn){
  const row=btn.closest('.item-row');
  confirmDeleteItem(decodeURIComponent(row.dataset.brand),decodeURIComponent(row.dataset.item));
}
function changeQty(brand,item,delta){
  if(!selectedStaff){document.getElementById('staff-required').style.display='block';document.getElementById('staff-grid').scrollIntoView({behavior:'smooth'});return;}
  const key=brand+':'+item;
  const nv=Math.max(0,(quantities[key]||0)+delta);
  if(nv===0)delete quantities[key];else quantities[key]=nv;
  const el=document.getElementById('q_'+sk(brand+item));
  if(el){el.textContent=nv;el.className='qty-display'+(nv>0?' has-value':'');}
  updateBrandCount(brand);updateCartCount();
}
function updateBrandCount(brand){
  const d=BRANDS[brand];if(!d)return;
  const t=d.items.reduce((s,i)=>s+(quantities[brand+':'+i]||0),0);
  document.querySelectorAll('.brand-name').forEach(el=>{
    if(el.textContent!==brand)return;
    const cnt=el.closest('.brand-header')?.querySelector('.brand-count');
    if(cnt){cnt.className='brand-count'+(t>0?' has-items':'');cnt.textContent=t>0?'✓ '+t+'個':d.items.length+'種';}
  });
}
function updateCartCount(){
  const t=Object.values(quantities).reduce((s,v)=>s+v,0);
  document.getElementById('cart-count').textContent=t;
  document.getElementById('submit-btn').disabled=t===0||!selectedStaff;
}
function inlineAdd(brand){
  const inp=document.getElementById('ii_'+sk(brand));if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  const d=BRANDS[brand];if(!d)return;
  if(d.items.includes(name)){
    inp.style.borderColor='var(--danger)';setTimeout(()=>{inp.style.borderColor='';},1500);
    inp.placeholder='その商材は既に存在します';setTimeout(()=>{inp.placeholder='商材名を入力して追加...';},2000);return;
  }
  d.items.push(name);saveStorage();inp.value='';renderBrands();
}
function openAddModal(){
  document.getElementById('add-brand-name').value='';
  document.getElementById('add-brand-err').style.display='none';
  document.getElementById('add-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('add-brand-name').focus(),300);
}
function closeAddModal(){document.getElementById('add-overlay').classList.remove('open');}
function confirmAddBrand(){
  const maker=document.getElementById('add-maker').value;
  const name=document.getElementById('add-brand-name').value.trim();
  const err=document.getElementById('add-brand-err');
  if(!name){err.textContent='ブランド名を入力してください';err.style.display='block';return;}
  if(BRANDS[name]){err.textContent='そのブランドは既に存在します';err.style.display='block';return;}
  BRANDS[name]={maker,items:[]};saveStorage();closeAddModal();
  currentMaker=maker;
  document.querySelectorAll('.maker-tab').forEach((b,i)=>b.classList.toggle('active',(maker==='all'&&i===0)||(maker==='lily'&&i===1)||(maker==='mirabis'&&i===2)));
  renderBrands();
  setTimeout(()=>{document.querySelectorAll('.brand-name').forEach(el=>{if(el.textContent===name)el.closest('.brand-section')?.scrollIntoView({behavior:'smooth',block:'center'});});},150);
}
let pendingDelete=null;
function confirmDeleteItem(brand,item){
  pendingDelete={type:'item',brand,item};
  document.getElementById('confirm-title').textContent='「'+item+'」を削除しますか？';
  document.getElementById('confirm-sub').textContent='「'+brand+'」から削除されます。この操作は元に戻せません。';
  document.getElementById('confirm-ok').onclick=execDelete;
  document.getElementById('confirm-overlay').classList.add('open');
}
function confirmDeleteBrandByEl(btn){confirmDeleteBrand(decodeURIComponent(btn.dataset.brand));}
function confirmDeleteBrand(brand){
  const cnt=BRANDS[brand]?.items.length||0;
  pendingDelete={type:'brand',brand};
  document.getElementById('confirm-title').textContent='「'+brand+'」を削除しますか？';
  document.getElementById('confirm-sub').textContent=`ブランドごと削除されます（商材 ${cnt} 件含む）。この操作は元に戻せません。`;
  document.getElementById('confirm-ok').onclick=execDelete;
  document.getElementById('confirm-overlay').classList.add('open');
}
function execDelete(){
  if(!pendingDelete)return;
  if(pendingDelete.type==='item'){
    const d=BRANDS[pendingDelete.brand];
    if(d){d.items=d.items.filter(i=>i!==pendingDelete.item);delete quantities[pendingDelete.brand+':'+pendingDelete.item];}
  }else{
    const d=BRANDS[pendingDelete.brand];
    if(d){d.items.forEach(i=>{delete quantities[pendingDelete.brand+':'+i];});delete BRANDS[pendingDelete.brand];}
  }
  saveStorage();closeConfirm();renderBrands();updateCartCount();
}
function closeConfirm(){pendingDelete=null;document.getElementById('confirm-overlay').classList.remove('open');}
function openCart(){
  if(!selectedStaff){document.getElementById('staff-required').style.display='block';document.getElementById('staff-grid').scrollIntoView({behavior:'smooth'});return;}
  const total=Object.values(quantities).reduce((s,v)=>s+v,0);if(!total)return;
  const grouped={};
  Object.entries(quantities).forEach(([key,qty])=>{
    const idx=key.indexOf(':');const b=key.slice(0,idx),i=key.slice(idx+1);
    if(!grouped[b])grouped[b]=[];grouped[b].push({item:i,qty});
  });
  let html=`<div style="margin-bottom:14px;padding:12px;background:var(--surface2);border-radius:8px;font-size:13px;color:var(--text2)">
    <span style="color:var(--accent);font-weight:700;font-family:'DM Mono',monospace">${selectedStaff}</span> の注文 · 計 <span style="color:var(--accent);font-weight:700">${total}</span> 個</div>`;
  Object.entries(grouped).forEach(([brand,items])=>{
    const d=BRANDS[brand];const mc=d?.maker==='lily'?'maker-lily':'maker-mirabis';const ml=d?.maker==='lily'?'リリー':'ミラビス';
    html+=`<div style="margin-bottom:10px"><div class="order-brand-label">${brand} <span class="maker-pill ${mc}">${ml}</span></div>`;
    items.forEach(({item,qty})=>{html+=`<div class="order-row"><span>${item}</span><span class="order-qty">${qty}個</span></div>`;});
    html+=`</div>`;
  });
  document.getElementById('cart-content').innerHTML=html;
  document.getElementById('cart-overlay').classList.add('open');
}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');}

async function submitOrder(){
  const total=Object.values(quantities).reduce((s,v)=>s+v,0);
  closeCart();
  document.getElementById('form-content').style.display='none';
  document.getElementById('bottom-bar').style.display='none';
  document.getElementById('success-screen').classList.add('show');
  document.getElementById('success-detail').innerHTML=`<span style="color:var(--text2);font-size:13px">送信中...</span>`;
  const items=Object.entries(quantities).map(([key,qty])=>{
    const idx=key.indexOf(':');return{name:key.slice(idx+1),qty};
  });
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({staff:selectedStaff,items,timestamp:new Date().toISOString()})});
    document.getElementById('success-detail').innerHTML=`<strong style="color:var(--accent)">${selectedStaff}</strong> さんの注文<br>計 <strong style="color:var(--accent)">${total}個</strong> を管理者に送信しました`;
  }catch(err){
    document.getElementById('success-detail').innerHTML=`<strong style="color:var(--accent)">${selectedStaff}</strong> さんの注文<br>計 <strong style="color:var(--accent)">${total}個</strong> を管理者に送信しました<br><span style="font-size:11px;color:var(--text3)">※オフライン時は後で再送されます</span>`;
  }
}

// ── 納品確認 ──
async function openDeliveryCheck(){
  if(!selectedStaff){
    document.getElementById('staff-required').style.display='block';
    document.getElementById('staff-grid').scrollIntoView({behavior:'smooth'});return;
  }
  document.getElementById('delivery-content').innerHTML=`
    <div class="loading-spinner">
      <div style="font-size:28px;margin-bottom:10px">⏳</div>
      <div>スプレッドシートから読み込み中...</div>
    </div>`;
  document.getElementById('delivery-btn-area').innerHTML='';
  document.getElementById('delivery-overlay').classList.add('open');
  try{
    const res=await fetch(`${GAS_URL}?action=getMyOrders&staff=${encodeURIComponent(selectedStaff)}`);
    const json=await res.json();
    if(json.status==='ok'){
      renderDeliveryOrders(json.orders);
    }else{
      showDeliveryError(json.message||'データの取得に失敗しました');
    }
  }catch(e){
    showDeliveryError('通信エラーが発生しました');
  }
}

function renderDeliveryOrders(orders){
  const content=document.getElementById('delivery-content');
  const btnArea=document.getElementById('delivery-btn-area');

  if(!orders||orders.length===0){
    content.innerHTML=`
      <div class="delivery-staff-card">
        <div>
          <div style="font-size:10px;color:var(--text3);margin-bottom:3px">スタッフ</div>
          <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--accent)">${selectedStaff}</div>
        </div>
      </div>
      <div class="no-orders">
        <div style="font-size:36px;margin-bottom:12px">📭</div>
        <div>発注履歴がありません</div>
        <div style="font-size:12px;color:var(--text3);margin-top:6px">注文を送信すると履歴が表示されます</div>
      </div>`;
    btnArea.innerHTML=`<button onclick="closeDeliveryCheck()" class="reset-btn" style="flex:1">閉じる</button>`;
    return;
  }

  const pending=orders.filter(o=>o.status!=='確認済');
  const done=orders.filter(o=>o.status==='確認済');
  const pendingTotal=pending.reduce((s,o)=>s+Number(o.qty),0);

  let html=`
    <div class="delivery-staff-card">
      <div>
        <div style="font-size:10px;color:var(--text3);margin-bottom:3px">スタッフ</div>
        <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--accent)">${selectedStaff}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:var(--text3);margin-bottom:3px">未受取</div>
        <div style="font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:${pending.length>0?'var(--accent)':'var(--text3)'}">${pending.length}件</div>
      </div>
    </div>`;

  if(pending.length>0){
    html+=`
      <div class="delivery-summary-bar">
        <span style="font-size:12px;color:var(--text2)">🟡 未受取の合計</span>
        <span style="font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent)">${pendingTotal}個 / ${pending.length}件</span>
      </div>
      <div class="delivery-order-card">`;
    pending.forEach(o=>{
      html+=`<div class="delivery-item-row">
        <span class="delivery-item-name">${o.item}</span>
        <span class="delivery-item-qty">${o.qty}個</span>
        <span class="status-badge status-pending">🟡 未受取</span>
      </div>`;
    });
    html+=`</div>`;
  }

  if(done.length>0){
    html+=`<div style="font-size:11px;color:var(--text3);margin:14px 0 8px;letter-spacing:.08em">✅ 受取済（${done.length}件）</div>
      <div class="delivery-order-card">`;
    done.slice(0,10).forEach(o=>{
      html+=`<div class="delivery-item-row" style="opacity:.6">
        <span class="delivery-item-name">${o.item}</span>
        <span class="delivery-item-qty">${o.qty}個</span>
        <span class="status-badge status-done">✅ 受取済</span>
      </div>`;
    });
    if(done.length>10)html+=`<div style="text-align:center;padding:8px;font-size:12px;color:var(--text3)">他 ${done.length-10}件</div>`;
    html+=`</div>`;
  }

  content.innerHTML=html;
  if(pending.length>0){
    btnArea.innerHTML=`
      <button onclick="closeDeliveryCheck()" class="reset-btn" style="flex:1">閉じる</button>
      <button onclick="submitDeliveryCheck()" class="submit-btn" style="flex:2;background:var(--success)">✅ 受け取りました</button>`;
  }else{
    btnArea.innerHTML=`<button onclick="closeDeliveryCheck()" class="submit-btn" style="flex:1">閉じる</button>`;
  }
}

function showDeliveryError(msg){
  document.getElementById('delivery-content').innerHTML=`
    <div style="text-align:center;padding:30px 20px;color:var(--text2);font-size:13px">
      <div style="font-size:32px;margin-bottom:12px">⚠️</div>
      <div>${msg}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:8px">ネットワーク接続を確認してください</div>
    </div>`;
  document.getElementById('delivery-btn-area').innerHTML=`<button onclick="closeDeliveryCheck()" class="reset-btn" style="flex:1">閉じる</button>`;
}

async function submitDeliveryCheck(){
  const btnArea=document.getElementById('delivery-btn-area');
  btnArea.innerHTML=`<div style="text-align:center;width:100%;padding:10px;color:var(--text2);font-size:13px">送信中...</div>`;
  try{
    await fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'deliveryCheck',staff:selectedStaff})});
  }catch(e){}
  document.getElementById('delivery-content').innerHTML=`
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:14px">✅</div>
      <div style="font-size:17px;font-weight:700;color:var(--success);margin-bottom:8px">受け取り完了！</div>
      <div style="font-size:13px;color:var(--text2)">
        <strong style="color:var(--accent)">${selectedStaff}</strong> さんの<br>未受取商材をすべて確認済みにしました
      </div>
    </div>`;
  btnArea.innerHTML=`<button onclick="closeDeliveryCheck()" class="submit-btn" style="flex:1">閉じる</button>`;
}

function closeDeliveryCheck(){document.getElementById('delivery-overlay').classList.remove('open');}
function resetItems(){quantities={};renderBrands();updateCartCount();}
function resetAll(){
  selectedStaff=null;quantities={};
  document.querySelectorAll('.staff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('success-screen').classList.remove('show');
  document.getElementById('form-content').style.display='';
  document.getElementById('bottom-bar').style.display='';
  document.getElementById('search-input').value='';
  searchQuery='';currentMaker='all';
  document.querySelectorAll('.maker-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
  renderBrands();updateCartCount();
}

init();
</script>
</body>
</html>
